<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akshada Muley — Work</title>
<link rel="stylesheet" href="style.css">
<style>
.gate-wrap {
  min-height: calc(100vh - 56px);
  display: flex; align-items: center; justify-content: center;
  padding: 48px 20px;
}
.gate-box {
  width: 100%; max-width: 400px;
  display: flex; flex-direction: column; gap: 0;
}
.gate-eyebrow {
  font-size: .58rem; font-weight: 600; letter-spacing: .22em;
  text-transform: uppercase; color: #bbb; margin-bottom: 12px;
}
.gate-title {
  font-size: 1.6rem; font-weight: 700; letter-spacing: -.02em;
  color: #141414; margin-bottom: 8px; line-height: 1.1;
}
.gate-desc {
  font-size: .82rem; font-weight: 300; color: #888;
  line-height: 1.6; margin-bottom: 32px;
  padding-bottom: 32px; border-bottom: 1px solid #E0DDD8;
}
.gate-label {
  font-size: .6rem; font-weight: 600; letter-spacing: .18em;
  text-transform: uppercase; color: #999; margin-bottom: 8px;
  display: block;
}
.gate-input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid #E0DDD8; background: #fff;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: .85rem; font-weight: 300; color: #141414;
  outline: none; margin-bottom: 12px;
  transition: border-color .2s;
}
.gate-input:focus { border-color: #141414; }
.gate-input::placeholder { color: #C8C5C0; }
.gate-btn {
  width: 100%; padding: 12px 20px;
  background: #141414; color: #fff; border: 1.5px solid #141414;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: .65rem; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; cursor: pointer;
  transition: background .2s, color .2s;
}
.gate-btn:hover { background: transparent; color: #141414; }
.gate-error {
  font-size: .72rem; font-weight: 300; color: #c0392b;
  margin-top: 10px; display: none;
}
.gate-error.show { display: block; }
</style>
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="nav-brand">Akshada Muley</a>
  <div class="nav-links">
    <a href="about.html" class="nav-link">About</a>
    <a href="work-gate.html" class="nav-link active">Work 🔒</a>
    <a href="projects.html" class="nav-link">Projects</a>
  </div>
</nav>

<div class="gate-wrap">
  <div class="gate-box">
    <div class="gate-eyebrow">Password Protected</div>
    <h1 class="gate-title">Work Samples</h1>
    <p class="gate-desc">This section contains professional work samples. Please enter the password to continue.</p>
    <label class="gate-label" for="pw-input">Password</label>
    <input class="gate-input" type="password" id="pw-input" placeholder="Enter password" autocomplete="off">
    <button class="gate-btn" onclick="checkPassword()">Enter →</button>
    <div class="gate-error" id="gate-error">Incorrect password. Please try again.</div>
  </div>
</div>

<script>
// Store access in session so they don't have to re-enter on every page
(function() {
  if (sessionStorage.getItem('work_access') === 'granted') {
    window.location.replace('work.html');
  }
})();

function checkPassword() {
  var input = document.getElementById('pw-input').value;
  var error = document.getElementById('gate-error');
  if (input === 'Akshadaworksamples2026') {
    sessionStorage.setItem('work_access', 'granted');
    window.location.replace('work.html');
  } else {
    error.classList.add('show');
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

// Allow Enter key
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });
});
</script>

<footer class="site-footer">
  <div class="footer-copy">© 2020–2026 by Akshada Muley</div>
  <div class="footer-links">
    <a href="https://www.linkedin.com/in/akshada-muley-assoc-aia-25b37b153" target="_blank" rel="noopener" class="footer-link">LinkedIn</a>
    <a href="https://drive.google.com/uc?export=download&id=1GJ8jZrhRk_v8KWGUJh4Qr4XcrbVuQSlw" target="_blank" rel="noopener" class="footer-link">Resume</a>
  </div>
</footer>

</body>
</html>
